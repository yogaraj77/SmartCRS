<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration | Smart Complaint Routing System</title>
  <style id="internal-app-css">
    :root { --bg:#101214; --surface:#181c20; --surface-2:#20262c; --line:#303840; --text:#f6f7f9; --muted:#a8b0b9; --teal:#14b8a6; --green:#22c55e; --shadow:0 18px 50px rgba(0,0,0,.28); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:30px 16px; background:radial-gradient(circle at 20% 12%,rgba(20,184,166,.2),transparent 26%),var(--bg); color:var(--text); font-family:"Segoe UI",Arial,sans-serif; }
    a { color:inherit; text-decoration:none; }
    .card { width:min(760px,100%); border:1px solid var(--line); border-radius:8px; background:var(--surface); box-shadow:var(--shadow); padding:28px; }
    .back { display:inline-flex; margin-bottom:22px; color:var(--muted); font-weight:800; }
    .heading { text-align:center; margin-bottom:24px; }
    .mark { display:grid; place-items:center; width:48px; height:48px; margin:0 auto 12px; border-radius:8px; background:var(--teal); color:#061312; font-weight:900; }
    h1 { margin:0 0 8px; }
    p { margin:0; color:var(--muted); line-height:1.6; }
    form { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    label { display:grid; gap:8px; color:var(--muted); font-size:14px; font-weight:800; }
    .span-2 { grid-column:span 2; }
    input { width:100%; border:1px solid var(--line); border-radius:8px; background:#0d0f11; color:var(--text); padding:12px 14px; outline:none; font:inherit; }
    input:focus { border-color:var(--teal); box-shadow:0 0 0 3px rgba(20,184,166,.18); }
    button { grid-column:span 2; min-height:44px; border:0; border-radius:8px; background:var(--teal); color:#061312; font-weight:900; cursor:pointer; font:inherit; }
    .preview-note { display:none; grid-column:span 2; border:1px solid rgba(20,184,166,.35); border-radius:8px; padding:10px; color:var(--green); background:rgba(20,184,166,.08); font-size:13px; }
    @media (max-width:700px) { form { grid-template-columns:1fr; } .span-2, button, .preview-note { grid-column:auto; } }
  </style>
</head>
<body>
  <main class="card">
    <a class="back" href="login.html" data-django-href="/login.html">Back to Login</a>
    <div class="heading">
      <div class="mark">ST</div>
      <h1>Student Registration</h1>
      <p>Create your student account to raise and track complaints.</p>
    </div>
    <form id="registerForm" method="post" action="/register/">
      <span style="display:none">{% csrf_token %}</span>
      <label>Full Name <input type="text" name="full_name" required></label>
      <label>Student ID <input type="text" name="student_id" required></label>
      <label class="span-2">Email <input type="email" name="email" required></label>
      <label>Password <input type="password" name="password1" required></label>
      <label>Confirm Password <input type="password" name="password2" required></label>
      <button type="submit">Create Student Account</button>
      <div class="preview-note" id="previewNote">Go Live preview is showing the UI only. Use Django runserver for real registration.</div>
    </form>
  </main>
  <script>
    if (location.port !== "5500") {
      document.querySelectorAll("[data-django-href]").forEach((link) => {
        link.setAttribute("href", link.dataset.djangoHref);
      });
    }

    const form = document.getElementById("registerForm");
    const note = document.getElementById("previewNote");
    if (location.port === "5500") {
      note.style.display = "block";
      form.addEventListener("submit", (event) => {
        event.preventDefault();
        note.textContent = "This page is styled in Go Live. Start Django with python manage.py runserver for real registration.";
      });
    }
  </script>
</body>
</html>
