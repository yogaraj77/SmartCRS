{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Complaint Routing System{% endblock %}</title>
  <style id="internal-app-css">
    {% include "_internal_styles.html" %}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% if messages %}
    <div class="message-stack" aria-live="polite">
      {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
  {% block body %}{% endblock %}
  <script src="{% static 'complaints/js/app.js' %}" defer></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
